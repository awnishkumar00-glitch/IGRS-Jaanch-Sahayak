name: Build IGRS APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download files
        uses: actions/checkout@v4

      - name: Extract project ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
          unzip "$ZIP_FILE" -d project

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Fix Android settings
        working-directory: project
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          sed -i '/buildFeatures { viewBinding = true }/i\    compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }\n    kotlinOptions { jvmTarget = "17" }' app/build.gradle.kts

      - name: Build APK
        working-directory: project
        run: gradle :app:assembleDebug

      - name: Copy APK
        run: cp project/app/build/outputs/apk/debug/app-debug.apk IGRS_Jaanch_Sahayak.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IGRS-Jaanch-Sahayak-APK
          path: IGRS_Jaanch_Sahayak.apk
